spring.application.name=finTrack

# MySQL local
spring.datasource.url=jdbc:mysql://localhost:3306/fintrack_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=320053

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT (JSON Web Token)
# secret: clave secreta para firmar los tokens. Debe tener al menos 256 bits (32 caracteres).
# En producción, usar una variable de entorno en vez de tenerla aquí en texto plano.
jwt.secret=finTrack-super-secret-key-que-debe-tener-al-menos-256-bits-para-HS256
# expiration-ms: tiempo de vida del token en milisegundos.
# 86400000 ms = 24 horas. Después de esto el usuario debe hacer login de nuevo.
jwt.expiration-ms=86400000
